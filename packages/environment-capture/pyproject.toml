[project]
name = "environment-capture"
version = "0.1.0"
description = "Run benchmarks for real and record agent-environment transitions as OTel GenAI JSONL."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
bedrock = ["boto3>=1.34"]
# Hub WRITE access (hub_push: publishing data bundles) and the fetch_data.py scripts that pull
# heavy upstream datasets (e.g. continual-learning's ~400 MB products.db). Reading/downloading
# published bundles (environment_capture.hub) is stdlib-only and needs no extra.
fetch = ["huggingface_hub>=0.23"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["environment_capture"]

[tool.hatch.build.targets.sdist]
# Ship ONLY the library: the sibling benchmark dirs are repo working data (capture scripts,
# prebuilt example models, fetched bundles) and would bloat the sdist by tens of MB.
include = ["/environment_capture", "/README.md", "/LICENSE", "/INTEGRATION.md"]
