<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title description">
  <title id="title">World model, runtime agent, and optimizer</title>
  <desc id="description">The world model sits above the runtime agent and optimizer; bidirectional arrows connect all three.</desc>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0070f3"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7928ca"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f5a623"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke-width: 3; }
      .box-title { fill: #0a0a0a; font: 600 26px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; text-anchor: middle; }
      .box-copy { fill: #0a0a0a; font: 20px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; text-anchor: middle; }
      .edge { fill: none; stroke-linecap: round; stroke-width: 4; }
      .edge-label-bg { fill: #24292f; opacity: 0.96; }
      .edge-label { fill: #ffffff; font: 17px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; text-anchor: middle; }
    </style>
  </defs>

  <rect class="box" x="330" y="40" width="300" height="108" rx="12" stroke="#0070f3"/>
  <text class="box-title" x="480" y="86">World model</text>
  <text class="box-copy" x="480" y="117">Simulates the environment</text>

  <rect class="box" x="70" y="360" width="300" height="108" rx="12" stroke="#7928ca"/>
  <text class="box-title" x="220" y="406">Runtime agent</text>
  <text class="box-copy" x="220" y="437">Runs tasks</text>

  <rect class="box" x="590" y="360" width="300" height="108" rx="12" stroke="#f5a623"/>
  <text class="box-title" x="740" y="406">Optimizer</text>
  <text class="box-copy" x="740" y="437">Improves the agent</text>

  <path class="edge" d="M 382 148 C 320 220 265 285 250 360" stroke="#0070f3" marker-start="url(#arrow-blue)" marker-end="url(#arrow-blue)"/>
  <path class="edge" d="M 578 148 C 640 220 695 285 710 360" stroke="#f5a623" marker-start="url(#arrow-orange)" marker-end="url(#arrow-orange)"/>
  <path class="edge" d="M 370 414 L 590 414" stroke="#7928ca" marker-start="url(#arrow-purple)" marker-end="url(#arrow-purple)"/>

  <rect class="edge-label-bg" x="88" y="230" width="220" height="38" rx="7"/>
  <text class="edge-label" x="198" y="255">actions / observations</text>

  <rect class="edge-label-bg" x="652" y="230" width="220" height="38" rx="7"/>
  <text class="edge-label" x="762" y="255">evaluation / feedback</text>

  <rect class="edge-label-bg" x="360" y="306" width="240" height="38" rx="7"/>
  <text class="edge-label" x="480" y="331">traces / harness updates</text>
</svg>
