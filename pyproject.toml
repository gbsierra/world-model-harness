[project]
name = "world-model-harness"
version = "0.1.0"
description = "Docker as an LLM: a frontier model acts as your agent's environment, reconstructed from OTel traces."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12",
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "pydantic>=2.6",
    "numpy>=1.26",
    "httpx>=0.27",
    "rich>=13.7",
    "gepa>=0.1.1",
    "tomli-w>=1.0",  # writing .wmh/config.toml (stdlib tomllib reads); every `wmh build` needs it
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.39"]
openai = ["openai>=1.40"]
bedrock = ["boto3>=1.34"]
otel = ["opentelemetry-proto>=1.24"]
# dev pulls in every backend SDK so `ty check` and the full test suite resolve over the whole
# project (the providers import anthropic/openai/boto3 lazily, but type-checking needs them present).
dev = [
    "pytest>=8.0",
    "ruff>=0.5",
    "ty>=0.0.1a1",
    "world-model-harness[anthropic,openai,bedrock,otel]",
]

[project.scripts]
wmh = "wmh.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["wmh"]

[tool.pytest.ini_options]
# Tests live inline next to the modules they cover (foo.py -> foo_test.py).
python_files = ["*_test.py"]
testpaths = ["wmh"]

[tool.ruff]
line-length = 100
target-version = "py311"
# `tools/` holds isolated, self-contained capture tooling that runs in its OWN Python env
# (e.g. tools/tau2-capture imports the real tau2-bench under Python 3.13). It is NOT part of the
# `wmh` package and `wmh` never imports it — only the trace files it produces land in `examples/`.
# Keep it out of the 3.11 wmh lint/type gate.
extend-exclude = ["tools/"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ANN", "BLE"]

[tool.ty.environment]
python-version = "3.11"

[tool.ty.src]
exclude = ["tools/"]
